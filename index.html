<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>polaroid-filter-generator</title>
  
  <!-- 引入 Tailwind CSS 進行快速排版 -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- 引入 Google Fonts: 包含 Jost 與 Noto Sans TC -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
  
  <!-- 引入 React 與 ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- 引入 Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <style>
    body { font-family: 'Noto Sans TC', sans-serif; background-color: #fafafa; }
    .font-jost { font-family: 'Jost', sans-serif; }
    input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
    input[type="color"]::-webkit-color-swatch { border: none; border-radius: 0.5rem; }
    /* 防止長按選取文字，確保長按只會觸發圖片儲存 */
    .preview-image { -webkit-touch-callout: default; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // --- 圖標組 ---
    const IconUpload = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg>);
    const IconType = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" x2="15" y1="20" y2="20"/><line x1="12" x2="12" y1="4" y2="20"/></svg>);
    const IconPalette = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="13.5" cy="6.5" r=".5" fill="currentColor"/><circle cx="17.5" cy="10.5" r=".5" fill="currentColor"/><circle cx="8.5" cy="7.5" r=".5" fill="currentColor"/><circle cx="6.5" cy="12.5" r=".5" fill="currentColor"/><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.926 0 1.648-.746 1.648-1.688 0-.437-.18-.835-.437-1.125-.29-.289-.438-.652-.438-1.125a1.64 1.64 0 0 1 1.668-1.668h1.996c3.051 0 5.555-2.503 5.555-5.554C21.965 6.012 17.461 2 12 2z"/></svg>);
    const IconDownload = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>);

    // --- 完整匯入 29 個 Lightroom 描述檔的參數 ---
    const filterPresets = {
      none: { name: '原圖 (無濾鏡)' },
      vintage1: {
        name: 'Vintage 1 (Polaroid ••••)',
        r: [[0, 0], [36, 42], [72, 66], [109, 85], [145, 113], [182, 148], [218, 182], [255, 215]],
        g: [[0, 15], [36, 40], [72, 71], [109, 104], [145, 132], [182, 160], [218, 186], [255, 211]],
        b: [[0, 12], [36, 52], [72, 75], [109, 94], [145, 114], [182, 141], [218, 169], [255, 185]]
      },
      vintage2: {
        name: 'Vintage 2 (Polaroid •••••)',
        r: [[0, 0], [36, 43], [72, 65], [109, 80], [145, 106], [182, 141], [218, 175], [255, 207]],
        g: [[0, 18], [36, 41], [72, 71], [109, 103], [145, 130], [182, 156], [218, 180], [255, 203]],
        b: [[0, 14], [36, 55], [72, 76], [109, 91], [145, 108], [182, 133], [218, 160], [255, 174]]
      },
      vintage3: { name: 'Vintage 3 (Preset 1)', exp: 0.6, cont: -62, temp: -43, tint: 10, sat: 0 },
      vintage4: { name: 'Vintage 4 (Preset 2)', exp: 0.34, cont: 0, temp: -31, tint: -33, sat: 10 },
      vintage5: { name: 'Vintage 5 (Preset 3)', exp: -0.14, cont: 38, temp: 19, tint: 43, sat: 0 },
      vintage6: { name: 'Vintage 6 (Preset 4)', exp: -0.36, cont: 24, temp: -7, tint: -48, sat: 2 },
      vintage7: { name: 'Vintage 7 (Preset 5)', exp: -0.12, cont: 0, temp: -19, tint: -52, sat: 0 },
      vintage8: { name: 'Vintage 8 (Preset 6)', exp: 0, cont: 0, temp: -40, tint: -31, sat: 2 },
      vintage9: { name: 'Vintage 9 (Preset 7)', exp: -0.36, cont: 12, temp: 5, tint: 5, sat: 14 },
      vintage10: { name: 'Vintage 10 (Preset 9)', exp: 0.36, cont: 26, temp: 7, tint: 24, sat: 0 },
      vintage11: { name: 'Vintage 11 (Preset 9 v2)', exp: -0.24, cont: 19, temp: 12, tint: 0, sat: 2 },
      vintage12: { name: 'Vintage 12 (Preset 10)', exp: 0, cont: 0, temp: 17, tint: -55, sat: 33 },
      vintage13: { name: 'Vintage 13 (Preset 11)', exp: 0.34, cont: 0, temp: 0, tint: 0, sat: 0 },
      vintage14: { name: 'Vintage 14 (Preset 12)', exp: -0.24, cont: -12, temp: -55, tint: -57, sat: 26 },
      vintage15: { name: 'Vintage 15 (Preset 14)', exp: 0, cont: 0, temp: 0, tint: 0, sat: 17 },
      vintage16: { name: 'Vintage 16 (Preset 14 v2)', exp: 0, cont: 0, temp: 0, tint: 0, sat: 36 },
      vintage17: { name: 'Vintage 17 (Preset 15)', exp: -0.24, cont: 43, temp: 24, tint: -24, sat: -7 },
      vintage18: { name: 'Vintage 18 (Preset 16)', exp: 0, cont: 0, temp: 0, tint: 0, sat: 5 },
      vintage19: { name: 'Vintage 19 (Preset 17)', exp: 0.44, cont: 0, temp: -12, tint: -31, sat: 33 },
      vintage20: { name: 'Vintage 20 (Preset 18)', exp: 1.31, cont: 14, temp: 17, tint: 100, sat: 0 },
      vintage21: { name: 'Vintage 21 (Preset 19)', exp: 0, cont: 0, temp: 0, tint: 0, sat: 0 },
      vintage22: { name: 'Vintage 22 (Preset 20)', exp: 0.48, cont: -67, temp: -55, tint: 19, sat: 0 },
      vintage23: { name: 'Vintage 23 (Preset 21)', exp: 0, cont: 0, temp: 48, tint: 0, sat: 19 },
      vintage24: { name: 'Vintage 24 (Preset 22)', exp: 0.24, cont: 0, temp: -2, tint: -69, sat: 10 },
      vintage25: { name: 'Vintage 25 (Preset 23)', exp: -0.12, cont: 19, temp: 10, tint: -43, sat: 7 },
      vintage26: { name: 'Vintage 26 (Preset 24)', exp: 0, cont: 0, temp: 0, tint: 0, sat: 0 },
      vintage27: { name: 'Vintage 27 (Preset 25)', exp: 0, cont: 0, temp: -21, tint: 52, sat: -26 },
      vintage28: { name: 'Vintage 28 (Preset 26)', exp: 0.36, cont: 0, temp: 0, tint: -7, sat: 36 },
      vintage29: { name: 'Vintage 29 (Preset 27)', exp: -0.48, cont: 19, temp: -31, tint: 0, sat: 33 }
    };

    const linearCurve = [[0, 0], [255, 255]];

    const generateLUT = (points) => {
      const lut = new Uint8Array(256);
      let pIdx = 0;
      for (let i = 0; i < 256; i++) {
        while (pIdx < points.length - 2 && i > points[pIdx + 1][0]) { pIdx++; }
        const p1 = points[pIdx];
        const p2 = points[pIdx + 1];
        const t = p2[0] === p1[0] ? 0 : (i - p1[0]) / (p2[0] - p1[0]);
        const val = p1[1] + t * (p2[1] - p1[1]);
        lut[i] = Math.min(255, Math.max(0, Math.round(val)));
      }
      return lut;
    };

    function App() {
      const canvasRef = useRef(null);
      const [imageObj, setImageObj] = useState(null);
      const [finalImageUrl, setFinalImageUrl] = useState("");
      
      // 頂部文案 
      const [headerLeft, setHeaderLeft] = useState('(81)');
      const [headerRight, setHeaderRight] = useState('HELOKI');
      
      // 表格文案 (時間、地點、評分)
      const [row1, setRow1] = useState('2023.10.25 14:30'); // TIME
      const [row2, setRow2] = useState('MUSEUM CAFE');    // LOCATION (地點)
      const [row3, setRow3] = useState('★★★★☆');          // RATING (評分)
      
      // 色彩與濾鏡
      const [bgColor, setBgColor] = useState('#ffffff');
      const [selectedPreset, setSelectedPreset] = useState('none');

      const handleImageUpload = (e) => {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = (event) => {
            const img = new Image();
            img.onload = () => setImageObj(img);
            img.src = event.target.result;
          };
          reader.readAsDataURL(file);
        }
      };

      useEffect(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const ctx = canvas.getContext('2d');

        // 畫布尺寸：1080 x 1920 (9:16)
        const cw = 1080;
        const ch = 1920;
        canvas.width = cw;
        canvas.height = ch;

        // 背景色
        ctx.fillStyle = bgColor; 
        ctx.fillRect(0, 0, cw, ch);

        const marginX = 80;
        const contentW = cw - marginX * 2; // 920

        const textColor = '#111827';
        ctx.fillStyle = textColor;

        // --- 1. 頂部排版 ---
        // 畫極細線（使用 rgba 透明度 + 座標 0.5 來達到 Crisp Thin Line 效果）
        ctx.lineWidth = 1; 
        ctx.strokeStyle = 'rgba(17, 24, 39, 0.35)'; 
        ctx.beginPath();
        ctx.moveTo(marginX, 140.5);
        ctx.lineTo(cw - marginX, 140.5);
        ctx.stroke();

        ctx.textBaseline = 'alphabetic';
        // 左上角標題 (縮小兩號)
        ctx.font = 'bold 36px "Jost", sans-serif';
        ctx.textAlign = 'left';
        ctx.fillText(headerLeft || ' ', marginX, 210);

        // 右上角標題 (縮小兩號)
        ctx.font = 'bold 52px "Jost", sans-serif';
        ctx.textAlign = 'right';
        ctx.fillText(headerRight || ' ', cw - marginX, 210);

        // --- 2. 圖片處理與繪製 ---
        if (imageObj) {
          const imgAreaH = 1000;
          const tempCanvas = document.createElement('canvas');
          tempCanvas.width = contentW;
          tempCanvas.height = imgAreaH;
          const tCtx = tempCanvas.getContext('2d');

          // 置中縮放
          const scale = Math.max(contentW / imageObj.width, imgAreaH / imageObj.height);
          const w = imageObj.width * scale;
          const h = imageObj.height * scale;
          const x = (contentW - w) / 2;
          const y = (imgAreaH - h) / 2;

          tCtx.drawImage(imageObj, x, y, w, h);

          // 套用自訂 Lightroom 描述檔引擎
          if (selectedPreset !== 'none') {
            const preset = filterPresets[selectedPreset];
            
            const rLUT = generateLUT(preset.r || linearCurve);
            const gLUT = generateLUT(preset.g || linearCurve);
            const bLUT = generateLUT(preset.b || linearCurve);

            // 解析 Lightroom 參數
            const expFactor = Math.pow(2, preset.exp || 0);
            const contFactor = ((preset.cont || 0) + 100) / 100;
            const temp = preset.temp || 0;
            const tint = preset.tint || 0;
            const satFactor = 1 + ((preset.sat || 0) / 100);

            const imgData = tCtx.getImageData(0, 0, contentW, imgAreaH);
            const data = imgData.data;
            
            for (let i = 0; i < data.length; i += 4) {
              // 套用 RGB 曲線
              let r = rLUT[data[i]];         
              let g = gLUT[data[i + 1]]; 
              let b = bLUT[data[i + 2]]; 

              // 曝光 (Exposure)
              if (expFactor !== 1) {
                r *= expFactor; g *= expFactor; b *= expFactor;
              }

              // 色溫與色調 (Temp & Tint)
              if (temp !== 0 || tint !== 0) {
                b -= temp * 0.8;
                r += temp * 0.8;
                g -= tint * 0.8;
                r += tint * 0.4;
                b += tint * 0.4;
              }

              // 對比 (Contrast)
              if (contFactor !== 1) {
                r = ((r / 255 - 0.5) * contFactor + 0.5) * 255;
                g = ((g / 255 - 0.5) * contFactor + 0.5) * 255;
                b = ((b / 255 - 0.5) * contFactor + 0.5) * 255;
              }

              // 飽和度 (Saturation)
              if (satFactor !== 1) {
                let lum = 0.299 * r + 0.587 * g + 0.114 * b;
                r = lum + (r - lum) * satFactor;
                g = lum + (g - lum) * satFactor;
                b = lum + (b - lum) * satFactor;
              }

              // 防溢出限制
              data[i] = Math.min(255, Math.max(0, r));
              data[i + 1] = Math.min(255, Math.max(0, g));
              data[i + 2] = Math.min(255, Math.max(0, b));
            }
            tCtx.putImageData(imgData, 0, 0);
          }

          ctx.drawImage(tempCanvas, marginX, 290);
        } else {
          ctx.fillStyle = '#f3f4f6';
          ctx.fillRect(marginX, 290, contentW, 1000);
          ctx.fillStyle = '#9ca3af';
          ctx.font = '40px "Noto Sans TC", sans-serif';
          ctx.textAlign = 'center';
          ctx.fillText('請上傳照片以顯示於此處', cw / 2, 790);
        }

        // --- 3. 底部表格排版 ---
        ctx.fillStyle = textColor;
        let tableY = 1520;
        const rowData = [
          { label: 'TIME', value: row1 },
          { label: 'LOCATION', value: row2 },
          { label: 'RATING', value: row3 }
        ];

        // 表格細線
        ctx.lineWidth = 1;
        ctx.strokeStyle = 'rgba(17, 24, 39, 0.35)';
        rowData.forEach((row) => {
          ctx.beginPath();
          ctx.moveTo(marginX, tableY + 0.5); // +0.5 保證線條像素極細不發散
          ctx.lineTo(cw - marginX, tableY + 0.5);
          ctx.stroke();

          const textY = tableY + 50; 
          
          ctx.font = 'bold 32px "Jost", "Noto Sans TC", sans-serif';
          ctx.textAlign = 'left';
          ctx.fillText(row.label, marginX, textY);

          ctx.textAlign = 'right';
          ctx.fillText(row.value, cw - marginX, textY);

          tableY += 75; // 加大間距，呼吸感更好
        });

        // 畫最後一條底線
        ctx.beginPath();
        ctx.moveTo(marginX, tableY + 0.5);
        ctx.lineTo(cw - marginX, tableY + 0.5);
        ctx.stroke();

        // --- 4. 最底部地理位置 ---
        const footerY = 1830;
        ctx.font = 'bold 28px "Jost", sans-serif';
        
        // 左：胡志明
        ctx.textAlign = 'left';
        ctx.fillText('HO CHI MINH', marginX, footerY);

        // 右：越南
        ctx.textAlign = 'right';
        ctx.fillText('VIETNAM', cw - marginX, footerY);

        // 轉為圖片以供儲存
        setFinalImageUrl(canvas.toDataURL('image/jpeg', 0.95));

      }, [imageObj, headerLeft, headerRight, row1, row2, row3, bgColor, selectedPreset]);

      const handleDownload = () => {
        if (!finalImageUrl) return;
        const link = document.createElement('a');
        link.download = `polaroid-filter-${Date.now()}.jpg`;
        link.href = finalImageUrl;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      };

      return (
        <div className="py-6 md:py-10 px-4 font-sans max-w-6xl mx-auto">
          <header className="mb-10 text-center">
            <h1 className="text-3xl md:text-4xl font-light text-gray-800 tracking-widest uppercase font-jost mb-2">polaroid-filter-generator</h1>
            <p className="text-gray-500 text-sm tracking-widest uppercase font-jost">Minimalist Film & Catalog Editor</p>
          </header>

          <div className="flex flex-col lg:flex-row gap-8 lg:items-start">
            
            <div className="w-full lg:w-[45%] bg-white p-8 rounded-2xl shadow-sm border border-gray-100 space-y-8">
              
              <div>
                <label className="text-sm font-bold text-gray-800 flex items-center gap-2 mb-3 tracking-wider font-jost uppercase">
                  <IconUpload className="w-4 h-4" /> 1. Upload Photo
                </label>
                <label className="flex justify-center w-full h-24 px-4 transition bg-gray-50 border border-gray-200 border-dashed rounded-xl cursor-pointer hover:border-gray-400">
                  <span className="flex items-center space-x-2">
                    <span className="font-medium text-gray-500 text-sm tracking-wide">
                      {imageObj ? '照片已載入，點擊重新選擇' : '點擊選擇檔案上傳'}
                    </span>
                  </span>
                  <input type="file" accept="image/*" className="hidden" onChange={handleImageUpload} />
                </label>
              </div>

              <div>
                <label className="text-sm font-bold text-gray-800 flex items-center gap-2 mb-3 tracking-wider font-jost uppercase">
                  <IconType className="w-4 h-4" /> 2. Top Header Text
                </label>
                <div className="flex gap-3">
                  <input type="text" value={headerLeft} onChange={(e) => setHeaderLeft(e.target.value)} placeholder="(81)" className="w-1/3 px-4 py-2.5 text-sm border border-gray-200 rounded-lg focus:ring-1 focus:ring-gray-800 font-jost uppercase bg-gray-50" />
                  <input type="text" value={headerRight} onChange={(e) => setHeaderRight(e.target.value)} placeholder="HELOKI" className="w-2/3 px-4 py-2.5 text-sm border border-gray-200 rounded-lg focus:ring-1 focus:ring-gray-800 font-jost font-bold uppercase bg-gray-50" />
                </div>
              </div>

              <div>
                <label className="text-sm font-bold text-gray-800 flex items-center gap-2 mb-3 tracking-wider font-jost uppercase">
                  <IconType className="w-4 h-4" /> 3. Catalog Information
                </label>
                <div className="space-y-3">
                  <div className="flex items-center text-sm">
                    <span className="w-1/4 text-gray-400 font-bold font-jost tracking-widest text-xs">TIME</span>
                    <input type="text" value={row1} onChange={(e) => setRow1(e.target.value)} placeholder="未填寫" className="w-3/4 px-4 py-2 border border-gray-200 rounded-lg uppercase bg-gray-50" />
                  </div>
                  <div className="flex items-center text-sm">
                    <span className="w-1/4 text-gray-400 font-bold font-jost tracking-widest text-xs">LOCATION</span>
                    <input type="text" value={row2} onChange={(e) => setRow2(e.target.value)} placeholder="未填寫" className="w-3/4 px-4 py-2 border border-gray-200 rounded-lg uppercase bg-gray-50" />
                  </div>
                  <div className="flex items-center text-sm">
                    <span className="w-1/4 text-gray-400 font-bold font-jost tracking-widest text-xs">RATING</span>
                    <input type="text" value={row3} onChange={(e) => setRow3(e.target.value)} placeholder="未填寫" className="w-3/4 px-4 py-2 border border-gray-200 rounded-lg bg-gray-50" />
                  </div>
                </div>
              </div>

              <div>
                <label className="text-sm font-bold text-gray-800 flex items-center gap-2 mb-3 tracking-wider font-jost uppercase">
                  <IconPalette className="w-4 h-4" /> 4. Color & Filter Presets
                </label>
                <div className="space-y-3">
                  <select 
                    value={selectedPreset} 
                    onChange={(e) => setSelectedPreset(e.target.value)}
                    className="w-full px-4 py-3 text-sm border border-gray-200 rounded-lg bg-gray-50 font-medium font-jost tracking-wide uppercase"
                  >
                    {Object.entries(filterPresets).map(([key, preset]) => (
                      <option key={key} value={key}>{preset.name}</option>
                    ))}
                  </select>
                  
                  <div className="flex items-center justify-between px-4 py-3 border border-gray-200 rounded-lg bg-gray-50">
                    <span className="text-xs font-bold text-gray-400 tracking-widest font-jost uppercase">FRAME COLOR</span>
                    <input type="color" value={bgColor} onChange={(e) => setBgColor(e.target.value)} className="w-8 h-8 cursor-pointer bg-transparent" />
                  </div>
                </div>
              </div>

              <div className="pt-2">
                <button 
                  onClick={handleDownload} 
                  className="w-full flex items-center justify-center gap-2 bg-gray-900 hover:bg-gray-800 text-white py-4 px-6 rounded-xl font-bold font-jost tracking-widest uppercase transition shadow-md"
                >
                  <IconDownload className="w-5 h-5" /> Export Image
                </button>
                <p className="text-xs text-center text-gray-400 mt-4 tracking-wide">
                  手機用戶：若無法點擊下載，請直接長按右側圖片儲存
                </p>
              </div>
            </div>

            <div className="w-full lg:w-[55%] flex flex-col items-center justify-start pt-4 lg:pt-0">
              <canvas ref={canvasRef} className="hidden" />
              <div className="relative shadow-2xl border border-gray-100 bg-white" style={{ width: '100%', maxWidth: '450px', aspectRatio: '9/16' }}>
                {finalImageUrl ? (
                  <img src={finalImageUrl} alt="Generated Filter" className="w-full h-full object-contain preview-image" />
                ) : (
                  <div className="w-full h-full animate-pulse flex items-center justify-center text-gray-300 font-jost uppercase tracking-widest text-sm">Waiting for image...</div>
                )}
              </div>
            </div>
            
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
